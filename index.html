<!DOCTYPE html>
<html>
<head>
  <title>Goat Tracks Gallery</title>
  <style>
    body { font-family: Arial, sans-serif; }
    .repo-list { margin: 20px; }
    .repo-list a {
      display: block;
      margin: 5px 0;
      text-decoration: none;
      color: #0066cc;
      cursor: pointer;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 10px;
      margin-top: 20px;
    }
    .grid img, .grid video {
      width: 100%;
      height: auto;
      border-radius: 5px;
    }
  </style>
</head>
<body>
  <h1>Goat Tracks Repositories</h1>
  <div id="repos" class="repo-list"></div>
  <h2 id="gallery-title"></h2>
  <div id="gallery" class="grid"></div>

  <script>
    async function loadRepos() {
      const res = await fetch("https://api.github.com/orgs/goat-tracks/repos");
      const repos = await res.json();
      const container = document.getElementById("repos");

      repos.forEach(repo => {
        const link = document.createElement("a");
        link.textContent = repo.name;
        link.onclick = () => loadGallery(repo.name);
        container.appendChild(link);
      });
    }

    async function loadGallery(repoName) {
      document.getElementById("gallery-title").textContent = `Gallery: ${repoName}`;
      const gallery = document.getElementById("gallery");
      gallery.innerHTML = "";

      const res = await fetch(`https://api.github.com/repos/goat-tracks/${repoName}/contents/images`);
      if (res.ok) {
        const files = await res.json();
        files.forEach(file => {
          if (file.name.match(/\.(jpg|jpeg|png|gif)$/i)) {
            const img = document.createElement("img");
            img.src = `https://raw.githubusercontent.com/goat-tracks/${repoName}/main/images/${file.name}`;
            gallery.appendChild(img);
          }
          if (file.name.match(/\.(mp4|webm)$/i)) {
            const vid = document.createElement("video");
            vid.src = `https://raw.githubusercontent.com/goat-tracks/${repoName}/main/images/${file.name}`;
            vid.controls = true;
            gallery.appendChild(vid);
          }
        });
      }
    }

    loadRepos();
  </script>
</body>
</html>
