<!doctype html>
<html>
  <head>
    <title>Goat Tracks Gallery</title>
    <style>
      body {
        font-family: Arial, sans-serif;
      }
      .repo-list {
        margin: 20px;
      }
      .repo-list a {
        display: block;
        margin: 5px 0;
        text-decoration: none;
        color: #0066cc;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
        gap: 10px;
        margin-top: 20px;
      }
      .grid img,
      .grid video {
        width: 100%;
        height: auto;
        border-radius: 5px;
      }
    </style>
  </head>
  <body>
    <h1>Goat Tracks Repositories</h1>
    <div id="repos" class="repo-list"></div>
    <h2 id="gallery-title"></h2>
    <div id="gallery" class="grid"></div>

    <script>
      async function loadRepos() {
        const res = await fetch(
          "https://api.github.com/orgs/goat-tracks/repos",
        );
        const repos = await res.json();
        const container = document.getElementById("repos");

        repos.forEach((repo) => {
          const link = document.createElement("a");
          link.textContent = repo.name;
          // Link points back to this page with ?repo=repoName
          link.href = `?repo=${repo.name}`;
          container.appendChild(link);
        });

        // If URL has ?repo=..., auto-load that gallery
        const params = new URLSearchParams(window.location.search);
        const repoName = params.get("repo");
        if (repoName) {
          loadGallery(repoName);
        }
      }

      async function loadGallery(repoName) {
        document.getElementById("gallery-title").textContent =
          `Gallery: ${repoName}`;
        const gallery = document.getElementById("gallery");
        gallery.innerHTML = "";

        const res = await fetch(
          `https://api.github.com/repos/goat-tracks/${repoName}/contents/images`,
        );
        if (res.ok) {
          const files = await res.json();
          files.forEach((file) => {
            if (file.name.match(/\.(jpg|jpeg|png|gif)$/i)) {
              const link = document.createElement("a");
              link.href = `https://raw.githubusercontent.com/goat-tracks/${repoName}/main/images/${file.name}`;
              link.target = "_blank"; // open in new tab

              const img = document.createElement("img");
              img.src = link.href;
              link.appendChild(img);

              gallery.appendChild(link);
            }
            if (file.name.match(/\.(mp4|webm)$/i)) {
              const link = document.createElement("a");
              link.href = `https://raw.githubusercontent.com/goat-tracks/${repoName}/main/images/${file.name}`;
              link.target = "_blank";

              const vid = document.createElement("video");
              vid.src = link.href;
              vid.controls = true;
              link.appendChild(vid);

              gallery.appendChild(link);
            }
          });
        }
      }

      loadRepos();
    </script>
  </body>
</html>
