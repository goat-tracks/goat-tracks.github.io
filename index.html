<!DOCTYPE html>
<html>
<head>
  <title>Goat Tracks Gallery</title>
  <style>
    body { font-family: Arial, sans-serif; }
    .repo { margin: 20px; }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 10px;
    }
    .grid img {
      width: 100%;
      height: auto;
      border-radius: 5px;
    }
  </style>
</head>
<body>
  <h1>Goat Tracks Repositories</h1>
  <div id="repos"></div>

  <script>
    async function loadRepos() {
      const res = await fetch("https://api.github.com/orgs/goat-tracks/repos");
      const repos = await res.json();
      const container = document.getElementById("repos");

      repos.forEach(async repo => {
        // Try to fetch images folder listing
        const imgRes = await fetch(`https://api.github.com/repos/goat-tracks/${repo.name}/contents/images`);
        if (imgRes.ok) {
          const files = await imgRes.json();
          const div = document.createElement("div");
          div.className = "repo";
          div.innerHTML = `<h2>${repo.name}</h2><div class="grid"></div>`;
          const grid = div.querySelector(".grid");

          files.forEach(file => {
            if (file.name.match(/\.(jpg|jpeg|png|gif)$/i)) {
              const img = document.createElement("img");
              img.src = `https://raw.githubusercontent.com/goat-tracks/${repo.name}/main/images/${file.name}`;
              grid.appendChild(img);
            }
          });

          container.appendChild(div);
        }
      });
    }
    loadRepos();
  </script>
</body>
</html>
